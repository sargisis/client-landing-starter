<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B7E55" />
      <stop offset="50%" stop-color="#C5A880" />
      <stop offset="100%" stop-color="#E6C89C" />
    </linearGradient>
    <linearGradient id="dark-wood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#251D18" />
      <stop offset="100%" stop-color="#140E0B" />
    </linearGradient>
    <linearGradient id="accent-wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A2D24" />
      <stop offset="50%" stop-color="#554134" />
      <stop offset="100%" stop-color="#3A2D24" />
    </linearGradient>
    <linearGradient id="suit-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E2A38" />
      <stop offset="100%" stop-color="#2D3E52" />
    </linearGradient>
    <linearGradient id="suit-charcoal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2B2B2B" />
      <stop offset="100%" stop-color="#3C3C3C" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C5A880" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#C5A880" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#080B13" />

  <!-- Ambient Glow -->
  <circle cx="400" cy="300" r="400" fill="url(#glow)" />

  <!-- Main Wardrobe Frame -->
  <rect x="80" y="40" width="640" height="520" fill="url(#dark-wood)" rx="10" stroke="url(#gold)" stroke-width="1.5" />

  <!-- Partition Walls -->
  <!-- Left Wall -->
  <rect x="260" y="40" width="16" height="520" fill="url(#accent-wood)" />
  <line x1="260" y1="40" x2="260" y2="560" stroke="rgba(255,255,255,0.05)" />
  <line x1="276" y1="40" x2="276" y2="560" stroke="rgba(255,255,255,0.05)" />

  <!-- Right Wall -->
  <rect x="520" y="40" width="16" height="520" fill="url(#accent-wood)" />
  <line x1="520" y1="40" x2="520" y2="560" stroke="rgba(255,255,255,0.05)" />
  <line x1="536" y1="40" x2="536" y2="560" stroke="rgba(255,255,255,0.05)" />

  <!-- Vertical Warm LED Glow Strips on Partitions -->
  <rect x="256" y="50" width="4" height="500" fill="url(#gold)" opacity="0.6" filter="blur(2px)" />
  <rect x="276" y="50" width="4" height="500" fill="url(#gold)" opacity="0.6" filter="blur(2px)" />
  <rect x="516" y="50" width="4" height="500" fill="url(#gold)" opacity="0.6" filter="blur(2px)" />
  <rect x="536" y="50" width="4" height="500" fill="url(#gold)" opacity="0.6" filter="blur(2px)" />

  <!-- LEFT COLUMN - Glass Shelves with Accessories -->
  <!-- Shelf 1 -->
  <rect x="96" y="140" width="150" height="8" fill="url(#glass)" stroke="url(#gold)" stroke-width="0.75" />
  <!-- Handbag 1 -->
  <path d="M 150,135 Q 170,110 190,135 Z" fill="none" stroke="url(#gold)" stroke-width="2" />
  <rect x="145" y="130" width="60" height="8" fill="url(#gold)" rx="2" />
  <path d="M 140,138 L 210,138 L 205,100 L 145,100 Z" fill="#b91c1c" /> <!-- Red leather bag -->

  <!-- Shelf 2 -->
  <rect x="96" y="270" width="150" height="8" fill="url(#glass)" stroke="url(#gold)" stroke-width="0.75" />
  <!-- Handbag 2 -->
  <path d="M 155,265 L 185,265 L 180,240 L 160,240 Z" fill="#d97706" /> <!-- Gold/orange bag -->
  <circle cx="170" cy="252" r="5" fill="url(#gold)" />

  <!-- Shelf 3 -->
  <rect x="96" y="400" width="150" height="8" fill="url(#glass)" stroke="url(#gold)" stroke-width="0.75" />
  <!-- Shoes -->
  <path d="M 130,398 L 155,398 L 165,385 L 150,380 Z" fill="#1e1e1e" stroke="url(#gold)" stroke-width="0.75" />
  <path d="M 180,398 L 205,398 L 215,385 L 200,380 Z" fill="#1e1e1e" stroke="url(#gold)" stroke-width="0.75" />

  <!-- MIDDLE COLUMN - Hanging Space -->
  <!-- Gold Clothes Rail -->
  <rect x="276" y="80" width="244" height="8" fill="url(#gold)" rx="2" />
  
  <!-- Hanger 1 & Suit 1 -->
  <line x1="330" y1="88" x2="330" y2="105" stroke="url(#gold)" stroke-width="1.5" />
  <path d="M 310,105 L 350,105 L 330,88 Z" fill="none" stroke="url(#gold)" stroke-width="1.5" />
  <path d="M 305,105 L 355,105 L 360,280 L 300,280 Z" fill="url(#suit-blue)" rx="5" />
  <polygon points="330,120 315,105 345,105" fill="#ffffff" /> <!-- White shirt collar -->
  <polygon points="330,125 320,105 340,105" fill="none" stroke="#b91c1c" stroke-width="1" /> <!-- Red tie -->

  <!-- Hanger 2 & Suit 2 -->
  <line x1="390" y1="88" x2="390" y2="105" stroke="url(#gold)" stroke-width="1.5" />
  <path d="M 370,105 L 410,105 L 390,88 Z" fill="none" stroke="url(#gold)" stroke-width="1.5" />
  <path d="M 365,105 L 415,105 L 420,300 L 360,300 Z" fill="url(#suit-charcoal)" rx="5" />
  <polygon points="390,120 375,105 405,105" fill="#FFE5A3" /> <!-- Cream shirt collar -->

  <!-- Hanger 3 & Coat 3 -->
  <line x1="450" y1="88" x2="450" y2="105" stroke="url(#gold)" stroke-width="1.5" />
  <path d="M 430,105 L 470,105 L 450,88 Z" fill="none" stroke="url(#gold)" stroke-width="1.5" />
  <path d="M 425,105 L 475,105 L 485,340 L 415,340 Z" fill="#654321" rx="5" /> <!-- Brown wool coat -->

  <!-- Drawers below hanging space -->
  <rect x="276" y="380" width="244" height="70" fill="url(#accent-wood)" stroke="rgba(197,168,128,0.15)" stroke-width="1" />
  <rect x="276" y="460" width="244" height="70" fill="url(#accent-wood)" stroke="rgba(197,168,128,0.15)" stroke-width="1" />
  <!-- Drawer handles -->
  <rect x="368" y="412" width="60" height="6" fill="url(#gold)" rx="2" />
  <rect x="368" y="492" width="60" height="6" fill="url(#gold)" rx="2" />

  <!-- RIGHT COLUMN - Folded Clothes and Boxes -->
  <!-- Top Shelf -->
  <rect x="536" y="140" width="168" height="8" fill="url(#accent-wood)" />
  <!-- Luxury boxes -->
  <rect x="555" y="70" width="60" height="70" fill="#1C2135" stroke="url(#gold)" stroke-width="1" rx="2" />
  <line x1="555" y1="90" x2="615" y2="90" stroke="url(#gold)" stroke-width="1.5" />
  <rect x="625" y="80" width="60" height="60" fill="#1C2135" stroke="url(#gold)" stroke-width="1" rx="2" />
  <line x1="625" y1="95" x2="685" y2="95" stroke="url(#gold)" stroke-width="1.5" />

  <!-- Middle Shelf -->
  <rect x="536" y="270" width="168" height="8" fill="url(#accent-wood)" />
  <!-- Folded Sweaters -->
  <rect x="560" y="240" width="120" height="30" fill="#4B5563" rx="4" />
  <rect x="570" y="215" width="100" height="25" fill="#9CA3AF" rx="4" />
  <rect x="580" y="195" width="80" height="20" fill="url(#gold)" opacity="0.75" rx="3" />

  <!-- Bottom Drawer -->
  <rect x="536" y="380" width="168" height="150" fill="url(#accent-wood)" stroke="rgba(197,168,128,0.15)" stroke-width="1" />
  <rect x="590" y="445" width="60" height="20" fill="url(#glass)" stroke="url(#gold)" stroke-width="1" rx="4" />
  <!-- Watch Organizer Inside translucent tray -->
  <circle cx="605" cy="455" r="5" fill="none" stroke="url(#gold)" stroke-width="1.5" />
  <circle cx="620" cy="455" r="5" fill="none" stroke="url(#gold)" stroke-width="1.5" />
  <circle cx="635" cy="455" r="5" fill="none" stroke="url(#gold)" stroke-width="1.5" />

  <!-- Soft reflection/lighting on ground -->
  <ellipse cx="400" cy="570" rx="320" ry="10" fill="url(#glow)" />
</svg>
